<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <title>Daily Stack</title>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-input: #252525;
            --border: #333;
            --text: #d4d0c8;
            --text-muted: #7a7568;
            --amber: #c8a45c;
            --amber-dim: #8a7340;
            --green: #5c8a5c;
            --green-dim: #3a5a3a;
            --red-dim: #5a3a3a;
            --serif: "Georgia", "Times New Roman", serif;
            --mono: "SF Mono", "Menlo", "Consolas", monospace;
            --sans: -apple-system, "Helvetica Neue", sans-serif;
            --radius: 8px;
        }

        html { font-size: 16px; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== NAV ===== */
        nav {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav button {
            flex: 1;
            padding: 14px 8px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        nav button.active {
            color: var(--amber);
            border-bottom-color: var(--amber);
        }

        /* ===== MAIN CONTENT ===== */
        main {
            flex: 1;
            padding: 24px 16px 100px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* ===== DATE NAV ===== */
        .date-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 46px;
            z-index: 9;
        }

        .date-nav button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .date-nav button:active {
            background: var(--bg-input);
        }

        .date-nav #date-nav-label {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text);
            letter-spacing: 0.03em;
            min-width: 180px;
            text-align: center;
        }

        .date-nav #today-btn {
            border-color: var(--amber-dim);
            color: var(--amber);
        }

        .date-nav #today-btn.hidden {
            visibility: hidden;
        }

        /* ===== MORNING VIEW ===== */
        .quote-block {
            margin: 32px 0;
            padding: 24px 20px;
            border-left: 3px solid var(--amber-dim);
            background: var(--bg-card);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        .quote-text {
            font-family: var(--serif);
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text);
            font-style: italic;
        }

        .quote-author {
            margin-top: 12px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .section-label {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .focus-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .focus-input:focus {
            border-color: var(--amber-dim);
        }

        .focus-input::placeholder {
            color: var(--text-muted);
        }

        .date-label {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        /* ===== EVENING VIEW ===== */
        .habits-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .habit-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
            -webkit-user-select: none;
        }

        .habit-item:active {
            background: var(--bg-input);
        }

        .habit-check {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 4px;
            margin-right: 14px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }

        .habit-item.done .habit-check {
            background: var(--green);
            border-color: var(--green);
        }

        .habit-item.done .habit-check::after {
            content: "✓";
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }

        .habit-name {
            font-size: 0.95rem;
            color: var(--text);
        }

        .habit-item.done .habit-name {
            color: var(--text-muted);
        }

        .habit-meta {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .weekly-progress {
            display: flex;
            gap: 3px;
            margin-left: auto;
        }

        .weekly-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
        }

        .weekly-dot.filled {
            background: var(--green);
        }

        textarea.reflection-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.95rem;
            outline: none;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s;
        }

        textarea.reflection-input:focus {
            border-color: var(--amber-dim);
        }

        textarea.reflection-input::placeholder {
            color: var(--text-muted);
        }

        .section-gap { margin-top: 32px; }

        /* ===== DASHBOARD ===== */
        .streaks-grid {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .streak-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
        }

        .streak-name {
            font-size: 0.85rem;
            color: var(--text);
            flex: 1;
        }

        .streak-count {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--amber);
            min-width: 60px;
            text-align: right;
        }

        .streak-bar {
            width: 40px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-left: 12px;
            overflow: hidden;
        }

        .streak-bar-fill {
            height: 100%;
            background: var(--amber);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .heatmap-container { margin-top: 32px; }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            margin-top: 8px;
        }

        .heatmap-day-label {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            text-align: center;
            padding-bottom: 4px;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            background: var(--bg-input);
            position: relative;
        }

        .heatmap-cell.level-1 { background: var(--green-dim); }
        .heatmap-cell.level-2 { background: var(--green); }
        .heatmap-cell.level-3 { background: #6aaa6a; }
        .heatmap-cell.future { background: var(--bg); border: 1px solid var(--border); opacity: 0.3; }

        .heatmap-cell .cell-date {
            position: absolute;
            bottom: 2px;
            right: 3px;
            font-family: var(--mono);
            font-size: 0.5rem;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .heatmap-legend {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin-top: 8px;
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        .legend-cell {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        /* ===== SETTINGS VIEW ===== */
        .settings-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .settings-habit-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            gap: 10px;
        }

        .settings-habit-item .habit-name {
            flex: 1;
            font-size: 0.9rem;
        }

        .settings-habit-item .habit-type-badge {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .settings-habit-item .delete-btn {
            background: none;
            border: 1px solid var(--red-dim);
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .settings-habit-item .delete-btn:active {
            color: #c66;
            border-color: #c66;
        }

        .add-habit-form {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .add-habit-form input,
        .add-habit-form select {
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.9rem;
            outline: none;
        }

        .add-habit-form input:focus,
        .add-habit-form select:focus {
            border-color: var(--amber-dim);
        }

        .add-habit-form .form-row {
            display: flex;
            gap: 8px;
        }

        .add-habit-form .form-row select {
            flex: 1;
        }

        .add-habit-form .form-row input[type="number"] {
            width: 70px;
        }

        .add-habit-btn {
            padding: 10px 16px;
            background: var(--amber-dim);
            border: none;
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-habit-btn:active {
            background: var(--amber);
        }

        /* ===== REVIEW VIEW ===== */
        .review-toggle {
            display: flex;
            gap: 2px;
            margin-bottom: 20px;
        }

        .review-toggle button {
            flex: 1;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            border-radius: var(--radius);
            transition: color 0.2s, border-color 0.2s;
        }

        .review-toggle button.active {
            color: var(--amber);
            border-color: var(--amber-dim);
        }

        .review-week-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
        }

        .review-day-row {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            gap: 12px;
        }

        .review-day-label {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            min-width: 30px;
            text-transform: uppercase;
        }

        .review-day-dots {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        .review-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
        }

        .review-dot.filled {
            background: var(--green);
        }

        .review-day-count {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            min-width: 30px;
            text-align: right;
        }

        .review-entries {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .review-entry {
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border-left: 3px solid var(--amber-dim);
        }

        .review-entry-date {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .review-entry-text {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.5;
        }

        .review-month-habit {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            gap: 12px;
        }

        .review-month-habit .habit-name {
            flex: 1;
            font-size: 0.85rem;
        }

        .review-rate-bar {
            width: 60px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .review-rate-fill {
            height: 100%;
            background: var(--green);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .review-rate-pct {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--amber);
            min-width: 40px;
            text-align: right;
        }

        .review-month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .review-month-nav button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: var(--radius);
            cursor: pointer;
        }

        .review-month-nav span {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text);
            min-width: 120px;
            text-align: center;
        }

        /* ===== UTILITIES ===== */
        .saved-indicator {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--green);
            opacity: 0;
            transition: opacity 0.3s;
            margin-top: 4px;
        }

        .saved-indicator.show { opacity: 1; }

        .summary-card {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .summary-stat {
            flex: 1;
            text-align: center;
            padding: 16px 8px;
            background: var(--bg-card);
            border-radius: var(--radius);
        }

        .summary-stat .stat-value {
            font-family: var(--mono);
            font-size: 1.5rem;
            color: var(--amber);
        }

        .summary-stat .stat-label {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<nav>
    <button id="nav-morning" onclick="showView('morning')" aria-label="Morgen-visning">Morgen</button>
    <button id="nav-evening" onclick="showView('evening')" aria-label="Aften-visning">Aften</button>
    <button id="nav-dashboard" onclick="showView('dashboard')" aria-label="Dashboard-visning">Dashboard</button>
    <button id="nav-review" onclick="showView('review')" aria-label="Review-visning">Review</button>
    <button id="nav-settings" onclick="showView('settings')" aria-label="Indstillinger">&#9881;</button>
</nav>

<div class="date-nav" id="date-nav">
    <button onclick="changeDate(-1)" aria-label="Forrige dag">&#8592;</button>
    <span id="date-nav-label"></span>
    <button onclick="changeDate(1)" aria-label="Næste dag">&#8594;</button>
    <button id="today-btn" onclick="goToday()">I dag</button>
</div>

<main>
    <!-- ===== MORNING VIEW ===== -->
    <div id="view-morning" class="view">
        <p class="date-label" id="morning-date"></p>

        <div class="quote-block">
            <p class="quote-text" id="quote-text"></p>
            <p class="quote-author" id="quote-author"></p>
        </div>

        <div class="section-gap">
            <p class="section-label">Hvad er mit fokus i dag?</p>
            <input
                type="text"
                class="focus-input"
                id="focus-input"
                placeholder="Skriv dit fokus..."
                autocomplete="off"
                aria-label="Dagens fokus"
            >
            <p class="saved-indicator" id="focus-saved">Gemt</p>
        </div>

        <div class="section-gap">
            <p class="section-label">Min tanke</p>
            <textarea
                class="reflection-input"
                id="journal-morning-input"
                placeholder="Skriv din tanke..."
                aria-label="Morgen journal"
            ></textarea>
            <p class="saved-indicator" id="journal-morning-saved">Gemt</p>
        </div>
    </div>

    <!-- ===== EVENING VIEW ===== -->
    <div id="view-evening" class="view">
        <p class="date-label" id="evening-date"></p>

        <p class="section-label">Dagens vaner</p>
        <ul class="habits-list" id="habits-list"></ul>

        <div class="section-gap">
            <p class="section-label">Hvad gik godt i dag?</p>
            <textarea
                class="reflection-input"
                id="reflection-input"
                placeholder="Skriv din refleksion..."
                aria-label="Dagens refleksion"
            ></textarea>
            <p class="saved-indicator" id="reflection-saved">Gemt</p>
        </div>

        <div class="section-gap">
            <p class="section-label">Min tanke</p>
            <textarea
                class="reflection-input"
                id="journal-evening-input"
                placeholder="Skriv din tanke..."
                aria-label="Aften journal"
            ></textarea>
            <p class="saved-indicator" id="journal-evening-saved">Gemt</p>
        </div>
    </div>

    <!-- ===== DASHBOARD VIEW ===== -->
    <div id="view-dashboard" class="view">
        <p class="date-label" id="dash-date"></p>

        <div class="summary-card" id="summary-card"></div>

        <p class="section-label">Streaks</p>
        <div class="streaks-grid" id="streaks-grid"></div>

        <div class="heatmap-container">
            <p class="section-label">Sidste 4 uger</p>
            <div class="heatmap-grid" id="heatmap-grid"></div>
            <div class="heatmap-legend">
                <span>Mindre</span>
                <div class="legend-cell" style="background: var(--bg-input)"></div>
                <div class="legend-cell" style="background: var(--green-dim)"></div>
                <div class="legend-cell" style="background: var(--green)"></div>
                <div class="legend-cell" style="background: #6aaa6a"></div>
                <span>Mere</span>
            </div>
        </div>
    </div>

    <!-- ===== REVIEW VIEW ===== -->
    <div id="view-review" class="view">
        <div class="review-toggle">
            <button id="review-week-btn" class="active" onclick="showReviewMode('week')">Uge</button>
            <button id="review-month-btn" onclick="showReviewMode('month')">Måned</button>
        </div>

        <div id="review-week-content">
            <div class="review-month-nav">
                <button onclick="changeReviewWeek(-1)">&#8592;</button>
                <span id="review-week-label"></span>
                <button onclick="changeReviewWeek(1)">&#8594;</button>
            </div>
            <p class="section-label">Vaner per dag</p>
            <div class="review-week-grid" id="review-week-grid"></div>
            <div class="review-entries" id="review-week-entries"></div>
        </div>

        <div id="review-month-content" style="display:none;">
            <div class="review-month-nav">
                <button onclick="changeReviewMonth(-1)">&#8592;</button>
                <span id="review-month-label"></span>
                <button onclick="changeReviewMonth(1)">&#8594;</button>
            </div>
            <div class="summary-card" id="review-month-summary"></div>
            <p class="section-label">Gennemførselsrate per vane</p>
            <div id="review-month-habits" style="display:flex;flex-direction:column;gap:2px;"></div>
        </div>
    </div>

    <!-- ===== SETTINGS VIEW ===== -->
    <div id="view-settings" class="view">
        <p class="section-label">Mine vaner</p>
        <ul class="settings-list" id="settings-habits-list"></ul>

        <div class="add-habit-form" id="add-habit-form">
            <p class="section-label">Tilføj ny vane</p>

<script src="quotes.js"></script>
<script>
// ===== CONFIG =====
// HABITS loaded dynamically from API — see loadHabitsConfig()
let HABITS = [];

// QUOTES loaded from quotes.js via script tag

// ===== DATE HELPERS =====
function todayStr() {
    return localDateStr(new Date());
}

function formatDateDanish(dateStr) {
    const d = new Date(dateStr + "T12:00:00");
    const days = ["søndag", "mandag", "tirsdag", "onsdag", "torsdag", "fredag", "lørdag"];
    const months = ["januar", "februar", "marts", "april", "maj", "juni",
                    "juli", "august", "september", "oktober", "november", "december"];
    return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function daysBetween(a, b) {
    const msPerDay = 86400000;
    return Math.round((new Date(b + "T12:00:00") - new Date(a + "T12:00:00")) / msPerDay);
}

function localDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function addDays(dateStr, n) {
    const d = new Date(dateStr + "T12:00:00");
    d.setDate(d.getDate() + n);
    return localDateStr(d);
}

function getWeekStart(dateStr) {
    const d = new Date(dateStr + "T12:00:00");
    const day = d.getDay();
    const diff = day === 0 ? 6 : day - 1; // Monday = start of week
    d.setDate(d.getDate() - diff);
    return localDateStr(d);
}

// ===== STORAGE =====
function storageKey(dateStr, suffix) {
    return `ds_${dateStr}_${suffix}`;
}

function getHabits(dateStr) {
    const raw = localStorage.getItem(storageKey(dateStr, "habits"));
    if (!raw) return {};
    try { return JSON.parse(raw); }
    catch { return {}; }
}

function safePut(key, value) {
    try { localStorage.setItem(key, value); }
    catch { console.warn("localStorage quota exceeded"); }
}

function setHabits(dateStr, habits) {
    safePut(storageKey(dateStr, "habits"), JSON.stringify(habits));
}

function getFocus(dateStr) {
    return localStorage.getItem(storageKey(dateStr, "focus")) || "";
}

function setFocus(dateStr, text) {
    safePut(storageKey(dateStr, "focus"), text);
}

function getReflection(dateStr) {
    return localStorage.getItem(storageKey(dateStr, "reflection")) || "";
}

function setReflection(dateStr, text) {
    safePut(storageKey(dateStr, "reflection"), text);
}

function getJournal(dateStr, period) {
    return localStorage.getItem(storageKey(dateStr, `journal_${period}`)) || "";
}

function setJournal(dateStr, period, text) {
    safePut(storageKey(dateStr, `journal_${period}`), text);
}

// ===== API SYNC =====
function apiPost(path, body) {
    fetch(path, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(body)
    }).catch(() => {});
}

async function syncDateFromApi(dateStr) {
    try {
        const [habitsRes, focusRes, reflectionRes, journalRes] = await Promise.all([
            fetch(`/api/habits/${dateStr}`).then(r => r.ok ? r.json() : null).catch(() => null),
            fetch(`/api/focus/${dateStr}`).then(r => r.ok ? r.json() : null).catch(() => null),
            fetch(`/api/reflection/${dateStr}`).then(r => r.ok ? r.json() : null).catch(() => null),
            fetch(`/api/journal/${dateStr}`).then(r => r.ok ? r.json() : null).catch(() => null),
        ]);

        // Merge habits
        const localHabits = getHabits(dateStr);
        const apiHabits = habitsRes || {};
        const merged = {...apiHabits, ...localHabits};
        setHabits(dateStr, merged);
        for (const [id, done] of Object.entries(merged)) {
            if (!apiHabits[id]) {
                apiPost("/api/habits", {date: dateStr, habit_id: id, done: done});
            }
        }

        // Merge focus: localStorage wins if non-empty
        if (focusRes && focusRes.text) {
            const localFocus = getFocus(dateStr);
            if (!localFocus) {
                setFocus(dateStr, focusRes.text);
            } else {
                apiPost("/api/focus", {date: dateStr, text: localFocus});
            }
        } else {
            const localFocus = getFocus(dateStr);
            if (localFocus) {
                apiPost("/api/focus", {date: dateStr, text: localFocus});
            }
        }

        // Merge reflection: same strategy
        if (reflectionRes && reflectionRes.text) {
            const localRefl = getReflection(dateStr);
            if (!localRefl) {
                setReflection(dateStr, reflectionRes.text);
            } else {
                apiPost("/api/reflection", {date: dateStr, text: localRefl});
            }
        } else {
            const localRefl = getReflection(dateStr);
            if (localRefl) {
                apiPost("/api/reflection", {date: dateStr, text: localRefl});
            }
        }

        // Merge journal: same strategy for morning and evening
        if (journalRes) {
            for (const period of ["morning", "evening"]) {
                const apiText = journalRes[period]?.text || "";
                const localText = getJournal(dateStr, period);
                if (apiText && !localText) {
                    setJournal(dateStr, period, apiText);
                } else if (localText) {
                    apiPost("/api/journal", {date: dateStr, period: period, text: localText});
                }
            }
        }
    } catch {
        // Offline — localStorage works as fallback
    }
}

async function syncFromApi() {
    await syncDateFromApi(todayStr());
}

// ===== STREAK CALCULATION =====
function calculateStreak(habitId, habit) {
    const today = todayStr();

    if (habit.type === "weekly") {
        return calculateWeeklyStreak(habitId, habit);
    }

    let streak = 0;
    let checkDate = today;

    // Check if today is done; if not, start from yesterday
    const todayData = getHabits(checkDate);
    if (!todayData[habitId]) {
        checkDate = addDays(today, -1);
    }

    while (true) {
        const data = getHabits(checkDate);
        if (data[habitId]) {
            streak++;
            checkDate = addDays(checkDate, -1);
        } else {
            break;
        }
        if (streak > 365) break; // Safety limit
    }

    return streak;
}

function calculateWeeklyStreak(habitId, habit) {
    const today = todayStr();
    const currentWeekStart = getWeekStart(today);
    let streak = 0;
    let weekStart = currentWeekStart;

    // Check current week first — if goal not yet met and week isn't over, start from previous week
    const currentWeekCount = countWeeklyCompletions(habitId, weekStart);
    if (currentWeekCount < habit.goal) {
        weekStart = addDays(weekStart, -7);
    }

    while (true) {
        const count = countWeeklyCompletions(habitId, weekStart);
        if (count >= habit.goal) {
            streak++;
            weekStart = addDays(weekStart, -7);
        } else {
            break;
        }
        if (streak > 52) break; // Safety limit
    }

    return streak;
}

function countWeeklyCompletions(habitId, weekStart) {
    let count = 0;
    for (let i = 0; i < 7; i++) {
        const dateStr = addDays(weekStart, i);
        const data = getHabits(dateStr);
        if (data[habitId]) count++;
    }
    return count;
}

// ===== QUOTE OF THE DAY =====
function getQuoteForDate(dateStr) {
    const epoch = new Date("2026-01-01T12:00:00");
    const target = new Date(dateStr + "T12:00:00");
    const daysSinceEpoch = Math.floor((target - epoch) / 86400000);
    const index = ((daysSinceEpoch % QUOTES.length) + QUOTES.length) % QUOTES.length;
    return QUOTES[index];
}

// ===== HABITS CONFIG =====
async function loadHabitsConfig() {
    try {
        const res = await fetch("/api/habits-config");
        if (res.ok) {
            const data = await res.json();
            if (data.length > 0) {
                HABITS = data.map(h => ({id: h.id, name: h.name, type: h.type, goal: h.goal || 1}));
                return;
            }
        }
    } catch {}
    // Fallback defaults if API unavailable
    HABITS = [
        {id: "walk", name: "Gå dagligt", type: "daily", goal: 1},
        {id: "run", name: "Løb", type: "weekly", goal: 3},
        {id: "strength", name: "Styrketræning", type: "weekly", goal: 3},
        {id: "eggs", name: "2 æg", type: "daily", goal: 1},
        {id: "sauerkraut", name: "Surkål", type: "daily", goal: 1},
        {id: "no_sugar", name: "Ingen sukker", type: "daily", goal: 1},
        {id: "meditation", name: "Meditation 15 min", type: "daily", goal: 1},
        {id: "bed_early", name: "I seng 20:00–20:30", type: "daily", goal: 1},
    ];
}

// ===== VIEW MANAGEMENT =====
let currentView = "morning";
let selectedDate = todayStr();
let reviewWeekStart = getWeekStart(todayStr());
let reviewYear = new Date().getFullYear();
let reviewMonth = new Date().getMonth() + 1;
let reviewMode = "week";

async function changeDate(delta) {
    selectedDate = addDays(selectedDate, delta);
    updateDateNav();
    showView(currentView);
    await syncDateFromApi(selectedDate);
    showView(currentView);
}

function goToday() {
    selectedDate = todayStr();
    updateDateNav();
    showView(currentView);
}

function updateDateNav() {
    const label = document.getElementById("date-nav-label");
    label.textContent = formatDateDanish(selectedDate);
    const todayBtn = document.getElementById("today-btn");
    if (selectedDate === todayStr()) {
        todayBtn.classList.add("hidden");
    } else {
        todayBtn.classList.remove("hidden");
    }
}

function showView(view) {
    currentView = view;
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.getElementById(`view-${view}`).classList.add("active");
    document.getElementById(`nav-${view}`).classList.add("active");

    // Hide date-nav on dashboard, review, settings
    const dateNav = document.getElementById("date-nav");
    const hideDateNav = ["dashboard", "review", "settings"].includes(view);
    dateNav.style.display = hideDateNav ? "none" : "flex";

    if (view === "morning") renderMorning();
    if (view === "evening") renderEvening();
    if (view === "dashboard") renderDashboard();
    if (view === "review") renderReview();
    if (view === "settings") renderSettings();
}

function autoDetectView() {
    if (selectedDate !== todayStr()) return "morning";
    const hour = new Date().getHours();
    if (hour < 12) return "morning";
    if (hour >= 17) return "evening";
    return "dashboard";
}

// ===== RENDER: MORNING =====
function renderMorning() {
    const today = selectedDate;
    document.getElementById("morning-date").textContent = formatDateDanish(today);

    const quote = getQuoteForDate(today);
    document.getElementById("quote-text").textContent = `\u201C${quote.text}\u201D`;
    document.getElementById("quote-author").textContent = `— ${quote.author}`;

    const focusInput = document.getElementById("focus-input");
    focusInput.value = getFocus(today);

    const journalMorningInput = document.getElementById("journal-morning-input");
    journalMorningInput.value = getJournal(today, "morning");
}

// ===== RENDER: EVENING =====
function renderEvening() {
    const today = selectedDate;
    document.getElementById("evening-date").textContent = formatDateDanish(today);

    const habitsList = document.getElementById("habits-list");
    habitsList.innerHTML = "";

    const habitsData = getHabits(today);

    HABITS.forEach(habit => {
        const li = document.createElement("li");
        li.className = "habit-item" + (habitsData[habit.id] ? " done" : "");
        li.setAttribute("role", "checkbox");
        li.setAttribute("aria-checked", habitsData[habit.id] ? "true" : "false");
        li.setAttribute("aria-label", habit.name);
        li.setAttribute("tabindex", "0");
        li.onclick = () => toggleHabit(habit.id);
        li.addEventListener("keydown", (e) => {
            if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggleHabit(habit.id); }
        });

        const checkDiv = document.createElement("div");
        checkDiv.className = "habit-check";
        li.appendChild(checkDiv);

        const nameSpan = document.createElement("span");
        nameSpan.className = "habit-name";
        nameSpan.textContent = habit.name;
        li.appendChild(nameSpan);

        if (habit.type === "weekly") {
            const weekStart = getWeekStart(today);
            const weekCount = countWeeklyCompletions(habit.id, weekStart);
            const progressDiv = document.createElement("div");
            progressDiv.className = "weekly-progress";
            for (let i = 0; i < habit.goal; i++) {
                const dot = document.createElement("div");
                dot.className = "weekly-dot" + (i < weekCount ? " filled" : "");
                progressDiv.appendChild(dot);
            }
            li.appendChild(progressDiv);
        }

        habitsList.appendChild(li);
    });

    const reflectionInput = document.getElementById("reflection-input");
    reflectionInput.value = getReflection(today);

    const journalEveningInput = document.getElementById("journal-evening-input");
    journalEveningInput.value = getJournal(today, "evening");
}

function toggleHabit(habitId) {
    const today = selectedDate;
    const data = getHabits(today);
    const done = !data[habitId];
    if (done) { data[habitId] = true; } else { delete data[habitId]; }
    setHabits(today, data);
    apiPost("/api/habits", {date: today, habit_id: habitId, done: done});
    renderEvening();
}

// ===== RENDER: DASHBOARD =====
function renderDashboard() {
    const today = selectedDate;
    document.getElementById("dash-date").textContent = formatDateDanish(today);

    // Summary card
    const summaryCard = document.getElementById("summary-card");
    const todayData = getHabits(today);
    const todayDone = HABITS.filter(h => todayData[h.id]).length;
    const longestStreak = Math.max(...HABITS.map(h => calculateStreak(h.id, h)), 0);
    const totalDays = countTotalActiveDays();

    summaryCard.textContent = "";
    const stats = [
        { value: `${todayDone}/${HABITS.length}`, label: "I dag" },
        { value: `${longestStreak}`, label: "Bedste streak" },
        { value: `${totalDays}`, label: "Sidste 90 dage" },
    ];
    stats.forEach(s => {
        const div = document.createElement("div");
        div.className = "summary-stat";
        const val = document.createElement("div");
        val.className = "stat-value";
        val.textContent = s.value;
        const lbl = document.createElement("div");
        lbl.className = "stat-label";
        lbl.textContent = s.label;
        div.appendChild(val);
        div.appendChild(lbl);
        summaryCard.appendChild(div);
    });

    // Streaks grid
    const streaksGrid = document.getElementById("streaks-grid");
    streaksGrid.innerHTML = "";
    const maxStreak = Math.max(...HABITS.map(h => calculateStreak(h.id, h)), 1);

    HABITS.forEach(habit => {
        const streak = calculateStreak(habit.id, habit);
        const pct = Math.min((streak / Math.max(maxStreak, 7)) * 100, 100);
        const unit = habit.type === "weekly" ? (streak === 1 ? "uge" : "uger") : (streak === 1 ? "dag" : "dage");

        const row = document.createElement("div");
        row.className = "streak-row";

        const nameEl = document.createElement("span");
        nameEl.className = "streak-name";
        nameEl.textContent = habit.name;
        row.appendChild(nameEl);

        const countEl = document.createElement("span");
        countEl.className = "streak-count";
        countEl.textContent = `${streak} ${unit}`;
        row.appendChild(countEl);

        const barEl = document.createElement("div");
        barEl.className = "streak-bar";
        const fillEl = document.createElement("div");
        fillEl.className = "streak-bar-fill";
        fillEl.style.width = `${pct}%`;
        barEl.appendChild(fillEl);
        row.appendChild(barEl);

        streaksGrid.appendChild(row);
    });

    // Heatmap (last 28 days)
    renderHeatmap();
}

function countTotalActiveDays() {
    let count = 0;
    const today = todayStr();
    for (let i = 0; i < 90; i++) {
        const dateStr = addDays(today, -i);
        const data = getHabits(dateStr);
        if (Object.values(data).some(v => v)) count++;
    }
    return count;
}

function renderHeatmap() {
    const grid = document.getElementById("heatmap-grid");
    grid.innerHTML = "";
    const today = todayStr();

    // Day labels (Mon-Sun)
    const dayLabels = ["Ma", "Ti", "On", "To", "Fr", "Lø", "Sø"];
    dayLabels.forEach(label => {
        const el = document.createElement("div");
        el.className = "heatmap-day-label";
        el.textContent = label;
        grid.appendChild(el);
    });

    // Find the Monday 4 weeks ago
    const startDate = addDays(getWeekStart(today), -21);

    for (let i = 0; i < 28; i++) {
        const dateStr = addDays(startDate, i);
        const cell = document.createElement("div");
        cell.className = "heatmap-cell";

        if (daysBetween(dateStr, today) < 0) {
            // Future date
            cell.classList.add("future");
        } else {
            const data = getHabits(dateStr);
            const done = HABITS.filter(h => data[h.id]).length;
            const ratio = done / HABITS.length;

            if (ratio > 0.75) cell.classList.add("level-3");
            else if (ratio > 0.4) cell.classList.add("level-2");
            else if (ratio > 0) cell.classList.add("level-1");
        }

        // Show day number
        const dayNum = new Date(dateStr + "T12:00:00").getDate();
        const dateSpan = document.createElement("span");
        dateSpan.className = "cell-date";
        dateSpan.textContent = dayNum;
        cell.appendChild(dateSpan);

        grid.appendChild(cell);
    }
}

// ===== AUTOSAVE =====
let focusSaveTimeout = null;
let reflectionSaveTimeout = null;

function setupAutosave() {
    const focusInput = document.getElementById("focus-input");
    const focusSaved = document.getElementById("focus-saved");

    focusInput.addEventListener("input", () => {
        clearTimeout(focusSaveTimeout);
        focusSaveTimeout = setTimeout(() => {
            const today = selectedDate;
            setFocus(today, focusInput.value);
            apiPost("/api/focus", {date: today, text: focusInput.value});
            flashSaved(focusSaved);
        }, 500);
    });

    const reflectionInput = document.getElementById("reflection-input");
    const reflectionSaved = document.getElementById("reflection-saved");

    reflectionInput.addEventListener("input", () => {
        clearTimeout(reflectionSaveTimeout);
        reflectionSaveTimeout = setTimeout(() => {
            const today = selectedDate;
            setReflection(today, reflectionInput.value);
            apiPost("/api/reflection", {date: today, text: reflectionInput.value});
            flashSaved(reflectionSaved);
        }, 500);
    });

    const journalMorningInput = document.getElementById("journal-morning-input");
    const journalMorningSaved = document.getElementById("journal-morning-saved");
    let journalMorningSaveTimeout = null;

    journalMorningInput.addEventListener("input", () => {
        clearTimeout(journalMorningSaveTimeout);
        journalMorningSaveTimeout = setTimeout(() => {
            const today = selectedDate;
            setJournal(today, "morning", journalMorningInput.value);
            apiPost("/api/journal", {date: today, period: "morning", text: journalMorningInput.value});
            flashSaved(journalMorningSaved);
        }, 500);
    });

    const journalEveningInput = document.getElementById("journal-evening-input");
    const journalEveningSaved = document.getElementById("journal-evening-saved");
    let journalEveningSaveTimeout = null;

    journalEveningInput.addEventListener("input", () => {
        clearTimeout(journalEveningSaveTimeout);
        journalEveningSaveTimeout = setTimeout(() => {
            const today = selectedDate;
            setJournal(today, "evening", journalEveningInput.value);
            apiPost("/api/journal", {date: today, period: "evening", text: journalEveningInput.value});
            flashSaved(journalEveningSaved);
        }, 500);
    });
}

function flashSaved(el) {
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 1500);
}

// ===== RENDER: REVIEW =====
function renderReview() {
    if (reviewMode === "week") renderWeeklyReview();
    else renderMonthlyReview();
}

function showReviewMode(mode) {
    reviewMode = mode;
    document.getElementById("review-week-btn").classList.toggle("active", mode === "week");
    document.getElementById("review-month-btn").classList.toggle("active", mode === "month");

    document.getElementById("review-month-content").style.display = mode === "month" ? "block" : "none";

}

function changeReviewWeek(delta) {
    reviewWeekStart = addDays(reviewWeekStart, delta * 7);
    renderWeeklyReview();
}

function changeReviewMonth(delta) {
    reviewMonth += delta;
    if (reviewMonth > 12) { reviewMonth = 1; reviewYear++; }
    if (reviewMonth < 1) { reviewMonth = 12; reviewYear--; }
    renderMonthlyReview();
}

async function renderWeeklyReview() {

        const row = document.createElement("div");

        label.className = "review-day-label";
        label.textContent = dayNames[i];
        row.appendChild(label);

        dots.className = "review-day-dots";

        HABITS.forEach(h => {

            dot.className = "review-dot" + (habitIds.includes(h.id) || getHabits(dateStr)[h.id] ? " filled" : "");
            dot.title = h.name;
            dots.appendChild(dot);
        });

        const refl = weekData?.reflections?.[dateStr] || getReflection(dateStr);

        const reflText = typeof refl === "string" ? refl : "";

        if (focusText) {
            const entry = document.createElement("div");
            entry.className = "review-entry";
            entry.innerHTML = `<div class="review-entry-date">${dayNames[i]} — fokus</div><div class="review-entry-text">${escapeHtml(focusText)}</div>`;
            entriesDiv.appendChild(entry);
        }
        if (reflText) {
            const entry = document.createElement("div");
            entry.className = "review-entry";
            entry.innerHTML = `<div class="review-entry-date">${dayNames[i]} — refleksion</div><div class="review-entry-text">${escapeHtml(reflText)}</div>`;
            entriesDiv.appendChild(entry);
        }
    }
}

async function renderMonthlyReview() {
    const monthNames = ["januar", "februar", "marts", "april", "maj", "juni",
                        "juli", "august", "september", "oktober", "november", "december"];
    document.getElementById("review-month-label").textContent =
        `${monthNames[reviewMonth - 1]} ${reviewYear}`;

    let monthData = null;
    try {
        const res = await fetch(`/api/review/monthly/${reviewYear}/${reviewMonth}`);
        if (res.ok) monthData = await res.json();
    } catch {}

    // Summary card
    const summary = document.getElementById("review-month-summary");
    summary.innerHTML = "";
    const activeDays = monthData?.total_active_days || 0;
    const daysInMonth = monthData?.days_in_month || 30;
    const avgRate = monthData?.completion_rates ?
        Math.round(Object.values(monthData.completion_rates).reduce((a, b) => a + b, 0) / Math.max(Object.keys(monthData.completion_rates).length, 1) * 100) : 0;

    [{value: activeDays, label: "Aktive dage"}, {value: `${daysInMonth}`, label: "Dage i md."}, {value: `${avgRate}%`, label: "Gns. rate"}].forEach(s => {
        const div = document.createElement("div");
        div.className = "summary-stat";
        div.innerHTML = `<div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>`;
        summary.appendChild(div);
    });

    // Per-habit rates
    const habitsDiv = document.getElementById("review-month-habits");
    habitsDiv.innerHTML = "";
    HABITS.forEach(h => {
        const rate = monthData?.completion_rates?.[h.id] || 0;
        const pct = Math.round(rate * 100);
        const row = document.createElement("div");
        row.className = "review-month-habit";
        row.innerHTML = `
            <span class="habit-name">${escapeHtml(h.name)}</span>
            <div class="review-rate-bar"><div class="review-rate-fill" style="width:${pct}%"></div></div>
            <span class="review-rate-pct">${pct}%</span>`;
        habitsDiv.appendChild(row);
    });
}

function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

// ===== RENDER: SETTINGS =====
function renderSettings() {
    const list = document.getElementById("settings-habits-list");
    list.innerHTML = "";
    HABITS.forEach((h, i) => {
        const li = document.createElement("li");
        li.className = "settings-habit-item";
        const nameSpan = document.createElement("span");
        nameSpan.className = "habit-name";
        nameSpan.textContent = h.name;
        li.appendChild(nameSpan);

        const badge = document.createElement("span");
        badge.className = "habit-type-badge";
        badge.textContent = h.type === "weekly" ? `ugentlig ×${h.goal}` : "daglig";
        li.appendChild(badge);

        const delBtn = document.createElement("button");
        delBtn.className = "delete-btn";
        delBtn.textContent = "Fjern";
        delBtn.onclick = (e) => { e.stopPropagation(); deleteHabit(h.id); };
        li.appendChild(delBtn);

        list.appendChild(li);
    });
}

async function addNewHabit() {
    const nameInput = document.getElementById("new-habit-name");
    const typeSelect = document.getElementById("new-habit-type");
    const goalInput = document.getElementById("new-habit-goal");
    const name = nameInput.value.trim();
    if (!name) return;

    const id = name.toLowerCase().replace(/[^a-zæøå0-9]/g, "_").replace(/_+/g, "_");
    const type = typeSelect.value;
    const goal = type === "weekly" ? parseInt(goalInput.value) || 3 : 1;
    const position = HABITS.length;

    try {
        await fetch("/api/habits-config", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({id, name, type, goal, position})
        });
    } catch {}

    HABITS.push({id, name, type, goal});
    nameInput.value = "";
    goalInput.value = "1";
    typeSelect.value = "daily";
    renderSettings();
}

async function deleteHabit(habitId) {
    try {
        await fetch(`/api/habits-config/${habitId}`, {method: "DELETE"});
    } catch {}
    HABITS = HABITS.filter(h => h.id !== habitId);
    renderSettings();
}

// ===== INIT =====
async function init() {
    await loadHabitsConfig();
    updateDateNav();
    setupAutosave();
    const initialView = autoDetectView();
    showView(initialView);

    // Sync from API in background, then re-render
    await syncFromApi();
    showView(currentView);

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(err => console.warn("SW:", err));
    }
}

init();
</script>
