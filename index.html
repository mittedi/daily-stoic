<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0f0f">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <title>Daily Stoic</title>
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f0f;
            --bg-card: #1a1a1a;
            --bg-input: #252525;
            --border: #333;
            --text: #d4d0c8;
            --text-muted: #7a7568;
            --amber: #c8a45c;
            --amber-dim: #8a7340;
            --green: #5c8a5c;
            --green-dim: #3a5a3a;
            --red-dim: #5a3a3a;
            --serif: "Georgia", "Times New Roman", serif;
            --mono: "SF Mono", "Menlo", "Consolas", monospace;
            --sans: -apple-system, "Helvetica Neue", sans-serif;
            --radius: 8px;
        }

        html { font-size: 16px; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== NAV ===== */
        nav {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav button {
            flex: 1;
            padding: 14px 8px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }

        nav button.active {
            color: var(--amber);
            border-bottom-color: var(--amber);
        }

        /* ===== MAIN CONTENT ===== */
        main {
            flex: 1;
            padding: 24px 16px 100px;
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        .view { display: none; }
        .view.active { display: block; }

        /* ===== DATE NAV ===== */
        .date-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 46px;
            z-index: 9;
        }

        .date-nav button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .date-nav button:active {
            background: var(--bg-input);
        }

        .date-nav #date-nav-label {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text);
            letter-spacing: 0.03em;
            min-width: 180px;
            text-align: center;
        }

        .date-nav #today-btn {
            border-color: var(--amber-dim);
            color: var(--amber);
        }

        .date-nav #today-btn.hidden {
            visibility: hidden;
        }

        /* ===== MORNING VIEW ===== */
        .quote-block {
            margin: 32px 0;
            padding: 24px 20px;
            border-left: 3px solid var(--amber-dim);
            background: var(--bg-card);
            border-radius: 0 var(--radius) var(--radius) 0;
        }

        .quote-text {
            font-family: var(--serif);
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text);
            font-style: italic;
        }

        .quote-author {
            margin-top: 12px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .section-label {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .focus-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .focus-input:focus {
            border-color: var(--amber-dim);
        }

        .focus-input::placeholder {
            color: var(--text-muted);
        }

        .date-label {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        /* ===== EVENING VIEW ===== */
        .habits-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .habit-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.15s;
            user-select: none;
            -webkit-user-select: none;
        }

        .habit-item:active {
            background: var(--bg-input);
        }

        .habit-check {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 4px;
            margin-right: 14px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s;
        }

        .habit-item.done .habit-check {
            background: var(--green);
            border-color: var(--green);
        }

        .habit-item.done .habit-check::after {
            content: "✓";
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }

        .habit-name {
            font-size: 0.95rem;
            color: var(--text);
        }

        .habit-item.done .habit-name {
            color: var(--text-muted);
        }

        .habit-meta {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .weekly-progress {
            display: flex;
            gap: 3px;
            margin-left: auto;
        }

        .weekly-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
        }

        .weekly-dot.filled {
            background: var(--green);
        }

        textarea.reflection-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.95rem;
            outline: none;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.2s;
        }

        textarea.reflection-input:focus {
            border-color: var(--amber-dim);
        }

        textarea.reflection-input::placeholder {
            color: var(--text-muted);
        }

        .section-gap { margin-top: 32px; }

        /* ===== DASHBOARD ===== */
        .streaks-grid {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .streak-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
        }

        .streak-name {
            font-size: 0.85rem;
            color: var(--text);
            flex: 1;
        }

        .streak-count {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--amber);
            min-width: 60px;
            text-align: right;
        }

        .streak-bar {
            width: 40px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-left: 12px;
            overflow: hidden;
        }

        .streak-bar-fill {
            height: 100%;
            background: var(--amber);
            border-radius: 3px;
            transition: width 0.3s;
        }


        .legend-cell {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }

        /* ===== SETTINGS VIEW ===== */
        .settings-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .settings-habit-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            gap: 10px;
        }

        .settings-habit-item .habit-name {
            flex: 1;
            font-size: 0.9rem;
        }

        .settings-habit-item .habit-type-badge {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 2px 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .settings-habit-item .delete-btn {
            background: none;
            border: 1px solid var(--red-dim);
            color: var(--text-muted);
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }

        .settings-habit-item .delete-btn:active {
            color: #c66;
            border-color: #c66;
        }

        .add-habit-form {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .add-habit-form input,
        .add-habit-form select {
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.9rem;
            outline: none;
        }

        .add-habit-form input:focus,
        .add-habit-form select:focus {
            border-color: var(--amber-dim);
        }

        .add-habit-form .form-row {
            display: flex;
            gap: 8px;
        }

        .add-habit-form .form-row select {
            flex: 1;
        }

        .add-habit-form .form-row input[type="number"] {
            width: 70px;
        }

        .add-habit-btn {
            padding: 10px 16px;
            background: var(--amber-dim);
            border: none;
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-habit-btn:active {
            background: var(--amber);
        }

        /* ===== BACKUP ===== */
        .backup-section {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .backup-btn {
            padding: 10px 16px;
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s;
            border: none;
        }

        .backup-btn.export {
            background: var(--green-dim);
        }

        .backup-btn.export:active {
            background: var(--green);
        }

        .backup-btn.import {
            background: var(--bg-input);
            border: 1px solid var(--border);
        }

        .backup-btn.import:active {
            border-color: var(--amber-dim);
        }

        /* ===== REVIEW VIEW ===== */
        .review-toggle {
            display: flex;
            gap: 2px;
            margin-bottom: 20px;
        }

        .review-toggle button {
            flex: 1;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            border-radius: var(--radius);
            transition: color 0.2s, border-color 0.2s;
        }

        .review-toggle button.active {
            color: var(--amber);
            border-color: var(--amber-dim);
        }

        .review-week-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
        }

        .review-day-row {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            gap: 12px;
        }

        .review-day-label {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-muted);
            min-width: 30px;
            text-transform: uppercase;
        }

        .review-day-dots {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        .review-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
        }

        .review-dot.filled {
            background: var(--green);
        }

        .review-day-count {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            min-width: 30px;
            text-align: right;
        }

        .review-entries {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .review-entry {
            padding: 12px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border-left: 3px solid var(--amber-dim);
        }

        .review-entry-date {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .review-entry-text {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.5;
        }

        .review-month-habit {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: var(--radius);
            gap: 12px;
        }

        .review-month-habit .habit-name {
            flex: 1;
            font-size: 0.85rem;
        }

        .review-rate-bar {
            width: 60px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .review-rate-fill {
            height: 100%;
            background: var(--green);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .review-rate-pct {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--amber);
            min-width: 40px;
            text-align: right;
        }

        .review-month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .review-month-nav button {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: var(--radius);
            cursor: pointer;
        }

        .review-month-nav span {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text);
            min-width: 120px;
            text-align: center;
        }

        /* ===== UTILITIES ===== */
        .saved-indicator {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--green);
            opacity: 0;
            transition: opacity 0.3s;
            margin-top: 4px;
        }

        .saved-indicator.show { opacity: 1; }

        .summary-card {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .summary-stat {
            flex: 1;
            text-align: center;
            padding: 16px 8px;
            background: var(--bg-card);
            border-radius: var(--radius);
        }

        .summary-stat .stat-value {
            font-family: var(--mono);
            font-size: 1.5rem;
            color: var(--amber);
        }

        .summary-stat .stat-label {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<nav>
    <button id="nav-main" onclick="showView('main')" aria-label="Daglig visning">I dag</button>
    <button id="nav-settings" onclick="showView('settings')" aria-label="Indstillinger">&#9881;</button>
</nav>

<div class="date-nav" id="date-nav">
    <button onclick="changeDate(-1)" aria-label="Forrige dag">&#8592;</button>
    <span id="date-nav-label"></span>
    <button onclick="changeDate(1)" aria-label="Næste dag">&#8594;</button>
    <button id="today-btn" onclick="goToday()">I dag</button>
</div>

<main>
    <!-- ===== MAIN VIEW ===== -->
    <div id="view-main" class="view">
        <p class="date-label" id="main-date"></p>

        <div class="quote-block">
            <p class="quote-text" id="quote-text"></p>
            <p class="quote-author" id="quote-author"></p>
        </div>

        <div class="section-gap">
            <p class="section-label">Dagens mål</p>
            <ul class="habits-list" id="habits-list"></ul>
        </div>

        <div class="section-gap">
            <p class="section-label">Streaks</p>
            <div class="streaks-grid" id="streaks-grid"></div>
        </div>

        <div class="section-gap">
            <p class="section-label">Refleksioner for dagen</p>
            <textarea
                class="reflection-input"
                id="reflection-input"
                placeholder="Skriv dine tanker..."
                aria-label="Refleksioner for dagen"
            ></textarea>
            <p class="saved-indicator" id="reflection-saved">Gemt</p>
        </div>
    </div>

    <!-- ===== SETTINGS VIEW ===== -->
    <div id="view-settings" class="view">
        <p class="section-label">Mine vaner</p>
        <ul class="settings-list" id="settings-habits-list"></ul>

        <div class="add-habit-form" id="add-habit-form">
            <p class="section-label">Tilføj ny vane</p>
            <input type="text" id="new-habit-name" placeholder="Vanenavn..." autocomplete="off">
            <div class="form-row">
                <select id="new-habit-type">
                    <option value="daily">Daglig</option>
                    <option value="weekly">Ugentlig</option>
                </select>
                <input type="number" id="new-habit-goal" min="1" max="7" value="1" placeholder="Mål">
            </div>
            <button class="add-habit-btn" onclick="addNewHabit()">Tilføj vane</button>
        </div>

        <div class="backup-section">
            <p class="section-label">Backup</p>
            <button class="backup-btn export" onclick="exportData()">Gem backup til fil</button>
            <button class="backup-btn import" onclick="document.getElementById('import-file').click()">Gendan fra fil</button>
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
        </div>
    </div>
</main>

<script src="quotes.js"></script>
<script>
// ===== CONFIG =====
// HABITS loaded dynamically from API — see loadHabitsConfig()
let HABITS = [];

// QUOTES loaded from quotes.js via script tag

// ===== DATE HELPERS =====
function todayStr() {
    return localDateStr(new Date());
}

function formatDateDanish(dateStr) {
    const d = new Date(dateStr + "T12:00:00");
    const days = ["søndag", "mandag", "tirsdag", "onsdag", "torsdag", "fredag", "lørdag"];
    const months = ["januar", "februar", "marts", "april", "maj", "juni",
                    "juli", "august", "september", "oktober", "november", "december"];
    return `${days[d.getDay()]} ${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function daysBetween(a, b) {
    const msPerDay = 86400000;
    return Math.round((new Date(b + "T12:00:00") - new Date(a + "T12:00:00")) / msPerDay);
}

function localDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function addDays(dateStr, n) {
    const d = new Date(dateStr + "T12:00:00");
    d.setDate(d.getDate() + n);
    return localDateStr(d);
}

function getWeekStart(dateStr) {
    const d = new Date(dateStr + "T12:00:00");
    const day = d.getDay();
    const diff = day === 0 ? 6 : day - 1; // Monday = start of week
    d.setDate(d.getDate() - diff);
    return localDateStr(d);
}

// ===== STORAGE =====
function storageKey(dateStr, suffix) {
    return `ds_${dateStr}_${suffix}`;
}

function getHabits(dateStr) {
    const raw = localStorage.getItem(storageKey(dateStr, "habits"));
    if (!raw) return {};
    try { return JSON.parse(raw); }
    catch { return {}; }
}

function safePut(key, value) {
    try { localStorage.setItem(key, value); }
    catch { console.warn("localStorage quota exceeded"); }
}

function setHabits(dateStr, habits) {
    safePut(storageKey(dateStr, "habits"), JSON.stringify(habits));
}

function getReflection(dateStr) {
    return localStorage.getItem(storageKey(dateStr, "reflection")) || "";
}

function setReflection(dateStr, text) {
    safePut(storageKey(dateStr, "reflection"), text);
}


// ===== BACKUP =====
function exportData() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith("ds_")) {
            data[key] = localStorage.getItem(key);
        }
    }
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const date = todayStr();
    a.href = url;
    a.download = `daily-stoic-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            let count = 0;
            for (const [key, value] of Object.entries(data)) {
                if (key.startsWith("ds_")) {
                    localStorage.setItem(key, value);
                    count++;
                }
            }
            alert(`Backup gendannet — ${count} poster indlæst.`);
            showView("main");
        } catch {
            alert("Kunne ikke læse filen. Er det en gyldig backup?");
        }
    };
    reader.readAsText(file);
    event.target.value = "";
}

// ===== STREAK CALCULATION =====
function calculateStreak(habitId, habit) {
    const today = todayStr();

    if (habit.type === "weekly") {
        return calculateWeeklyStreak(habitId, habit);
    }

    let streak = 0;
    let checkDate = today;

    // Check if today is done; if not, start from yesterday
    const todayData = getHabits(checkDate);
    if (!todayData[habitId]) {
        checkDate = addDays(today, -1);
    }

    while (true) {
        const data = getHabits(checkDate);
        if (data[habitId]) {
            streak++;
            checkDate = addDays(checkDate, -1);
        } else {
            break;
        }
        if (streak > 365) break; // Safety limit
    }

    return streak;
}

function calculateWeeklyStreak(habitId, habit) {
    const today = todayStr();
    const currentWeekStart = getWeekStart(today);
    let streak = 0;
    let weekStart = currentWeekStart;

    // Check current week first — if goal not yet met and week isn't over, start from previous week
    const currentWeekCount = countWeeklyCompletions(habitId, weekStart);
    if (currentWeekCount < habit.goal) {
        weekStart = addDays(weekStart, -7);
    }

    while (true) {
        const count = countWeeklyCompletions(habitId, weekStart);
        if (count >= habit.goal) {
            streak++;
            weekStart = addDays(weekStart, -7);
        } else {
            break;
        }
        if (streak > 52) break; // Safety limit
    }

    return streak;
}

function countWeeklyCompletions(habitId, weekStart) {
    let count = 0;
    for (let i = 0; i < 7; i++) {
        const dateStr = addDays(weekStart, i);
        const data = getHabits(dateStr);
        if (data[habitId]) count++;
    }
    return count;
}

// ===== QUOTE OF THE DAY =====
function getQuoteForDate(dateStr) {
    const epoch = new Date("2026-01-01T12:00:00");
    const target = new Date(dateStr + "T12:00:00");
    const daysSinceEpoch = Math.floor((target - epoch) / 86400000);
    const index = ((daysSinceEpoch % QUOTES.length) + QUOTES.length) % QUOTES.length;
    return QUOTES[index];
}

// ===== HABITS CONFIG =====
function loadHabitsConfig() {
    const HABITS_VERSION = "v2";
    if (localStorage.getItem("ds_habits_version") !== HABITS_VERSION) {
        HABITS = [
            {id: "bed_early", name: "I seng inden kl. 21.00", type: "daily", goal: 1},
            {id: "achilles", name: "Daglige øvelser til styrkelse af min akillessene", type: "daily", goal: 1},
        ];
        localStorage.setItem("ds_habits_config", JSON.stringify(HABITS));
        localStorage.setItem("ds_habits_version", HABITS_VERSION);
        return;
    }
    const raw = localStorage.getItem("ds_habits_config");
    if (raw) {
        try {
            const data = JSON.parse(raw);
            if (data.length > 0) {
                HABITS = data;
                return;
            }
        } catch {}
    }
    HABITS = [
        {id: "bed_early", name: "I seng inden kl. 21.00", type: "daily", goal: 1},
        {id: "achilles", name: "Daglige øvelser til styrkelse af min akillessene", type: "daily", goal: 1},
    ];
    localStorage.setItem("ds_habits_config", JSON.stringify(HABITS));
}

function saveHabitsConfig() {
    localStorage.setItem("ds_habits_config", JSON.stringify(HABITS));
}

// ===== VIEW MANAGEMENT =====
let currentView = "main";
let selectedDate = todayStr();

function changeDate(delta) {
    selectedDate = addDays(selectedDate, delta);
    updateDateNav();
    showView(currentView);
}

function goToday() {
    selectedDate = todayStr();
    updateDateNav();
    showView(currentView);
}

function updateDateNav() {
    const label = document.getElementById("date-nav-label");
    label.textContent = formatDateDanish(selectedDate);
    const todayBtn = document.getElementById("today-btn");
    if (selectedDate === todayStr()) {
        todayBtn.classList.add("hidden");
    } else {
        todayBtn.classList.remove("hidden");
    }
}

function showView(view) {
    currentView = view;
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
    document.getElementById(`view-${view}`).classList.add("active");
    document.getElementById(`nav-${view}`).classList.add("active");

    const dateNav = document.getElementById("date-nav");
    dateNav.style.display = view === "settings" ? "none" : "flex";

    if (view === "main") renderMain();
    if (view === "settings") renderSettings();
}

// ===== RENDER: MAIN =====
function renderMain() {
    const today = selectedDate;
    document.getElementById("main-date").textContent = formatDateDanish(today);

    const quote = getQuoteForDate(today);
    document.getElementById("quote-text").textContent = `\u201C${quote.text}\u201D`;
    document.getElementById("quote-author").textContent = `— ${quote.author}`;

    // Habits
    const habitsList = document.getElementById("habits-list");
    habitsList.innerHTML = "";
    const habitsData = getHabits(today);
    HABITS.forEach(habit => {
        const li = document.createElement("li");
        li.className = "habit-item" + (habitsData[habit.id] ? " done" : "");
        li.setAttribute("role", "checkbox");
        li.setAttribute("aria-checked", habitsData[habit.id] ? "true" : "false");
        li.setAttribute("aria-label", habit.name);
        li.setAttribute("tabindex", "0");
        li.onclick = () => toggleHabit(habit.id);
        li.addEventListener("keydown", (e) => {
            if (e.key === " " || e.key === "Enter") { e.preventDefault(); toggleHabit(habit.id); }
        });
        const checkDiv = document.createElement("div");
        checkDiv.className = "habit-check";
        li.appendChild(checkDiv);
        const nameSpan = document.createElement("span");
        nameSpan.className = "habit-name";
        nameSpan.textContent = habit.name;
        li.appendChild(nameSpan);
        habitsList.appendChild(li);
    });

    // Streaks
    const streaksGrid = document.getElementById("streaks-grid");
    streaksGrid.innerHTML = "";
    const maxStreak = Math.max(...HABITS.map(h => calculateStreak(h.id, h)), 1);
    HABITS.forEach(habit => {
        const streak = calculateStreak(habit.id, habit);
        const pct = Math.min((streak / Math.max(maxStreak, 7)) * 100, 100);
        const unit = streak === 1 ? "dag" : "dage";
        const row = document.createElement("div");
        row.className = "streak-row";
        const nameEl = document.createElement("span");
        nameEl.className = "streak-name";
        nameEl.textContent = habit.name;
        row.appendChild(nameEl);
        const countEl = document.createElement("span");
        countEl.className = "streak-count";
        countEl.textContent = `${streak} ${unit}`;
        row.appendChild(countEl);
        const barEl = document.createElement("div");
        barEl.className = "streak-bar";
        const fillEl = document.createElement("div");
        fillEl.className = "streak-bar-fill";
        fillEl.style.width = `${pct}%`;
        barEl.appendChild(fillEl);
        row.appendChild(barEl);
        streaksGrid.appendChild(row);
    });

    // Reflection
    const reflectionInput = document.getElementById("reflection-input");
    reflectionInput.value = getReflection(today);
}

function toggleHabit(habitId) {
    const today = selectedDate;
    const data = getHabits(today);
    const done = !data[habitId];
    if (done) { data[habitId] = true; } else { delete data[habitId]; }
    setHabits(today, data);
    renderMain();
}



// ===== AUTOSAVE =====
let reflectionSaveTimeout = null;

function setupAutosave() {
    const reflectionInput = document.getElementById("reflection-input");
    const reflectionSaved = document.getElementById("reflection-saved");

    reflectionInput.addEventListener("input", () => {
        clearTimeout(reflectionSaveTimeout);
        reflectionSaveTimeout = setTimeout(() => {
            const today = selectedDate;
            setReflection(today, reflectionInput.value);
            flashSaved(reflectionSaved);
        }, 500);
    });
}

function flashSaved(el) {
    el.classList.add("show");
    setTimeout(() => el.classList.remove("show"), 1500);
}



function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
}

// ===== RENDER: SETTINGS =====
function renderSettings() {
    const list = document.getElementById("settings-habits-list");
    list.innerHTML = "";
    HABITS.forEach((h, i) => {
        const li = document.createElement("li");
        li.className = "settings-habit-item";
        const nameSpan = document.createElement("span");
        nameSpan.className = "habit-name";
        nameSpan.textContent = h.name;
        li.appendChild(nameSpan);

        const badge = document.createElement("span");
        badge.className = "habit-type-badge";
        badge.textContent = h.type === "weekly" ? `ugentlig ×${h.goal}` : "daglig";
        li.appendChild(badge);

        const delBtn = document.createElement("button");
        delBtn.className = "delete-btn";
        delBtn.textContent = "Fjern";
        delBtn.onclick = (e) => { e.stopPropagation(); deleteHabit(h.id); };
        li.appendChild(delBtn);

        list.appendChild(li);
    });
}

function addNewHabit() {
    const nameInput = document.getElementById("new-habit-name");
    const typeSelect = document.getElementById("new-habit-type");
    const goalInput = document.getElementById("new-habit-goal");
    const name = nameInput.value.trim();
    if (!name) return;

    const id = name.toLowerCase().replace(/[^a-zæøå0-9]/g, "_").replace(/_+/g, "_");
    const type = typeSelect.value;
    const goal = type === "weekly" ? parseInt(goalInput.value) || 3 : 1;

    HABITS.push({id, name, type, goal});
    saveHabitsConfig();
    nameInput.value = "";
    goalInput.value = "1";
    typeSelect.value = "daily";
    renderSettings();
}

function deleteHabit(habitId) {
    HABITS = HABITS.filter(h => h.id !== habitId);
    saveHabitsConfig();
    renderSettings();
}

// ===== INIT =====
function init() {
    loadHabitsConfig();
    updateDateNav();
    setupAutosave();
    showView("main");

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(err => console.warn("SW:", err));
    }
}

init();
</script>
